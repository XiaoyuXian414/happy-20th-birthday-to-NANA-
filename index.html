<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝纳纳仔20岁
           生日快乐！</title>

           
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Great+Vibes&family=Parisienne&display=swap" rel="stylesheet">
    <style>
        /* 页面整体样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ECE94B 0%, #FFC6A4 35%, #F88F70 70%, #BC5B40 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: left;
        }
        .card {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 30px;
            max-width: 1100px;
            width: 90%;
            margin: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            border: 2px solid rgba(255,255,255,0.6);
            display: flex;
            gap: 30px;
            align-items: center;
        }
        h1 {
            font-size: 8.0rem;
            color: #BC5B40;
            margin: 0 0 10px 0;
            line-height: 1.0;
            font-weight: 700;
            letter-spacing: 2px;
            font-family: 'Allura', cursive;
            text-shadow: 0 4px 8px rgba(0,0,0,0.15), 0 8px 16px rgba(0,0,0,0.1), 0 2px 4px rgba(255,255,255,0.5) inset;
        }
        .subtitle {
            color: rgba(71, 14, 14, 0.866);
            margin-top: 8px;
            font-size: 1.8rem;
        }
        .message {
            font-size: 1.15rem;
            color: #5a3a35;
            margin: 20px 0;
            line-height: 1.6;
            font-family: "SimSun", "Songti SC", "Noto Serif SC", serif;
        }
    
        .flower {
            font-size: 2.0rem;
            margin: 18px 0;
            filter: drop-shadow(0 8px 8px rgba(0,0,0,0.08));
        }
        /* 人像样式 */
        .left {
            flex: 0 0 46%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .portrait-frame {
            width: 436px;
            height: 556px;
            background: linear-gradient(145deg, #f5dfa0 0%, #FFC6A4 30%, #F88F70 65%, #BC5B40 100%);
            clip-path: ellipse(48% 52% at 50% 50%);
            filter:
                drop-shadow(0 22px 44px rgba(188,91,64,0.48))
                drop-shadow(0 6px 14px rgba(188,91,64,0.28))
                drop-shadow(0 -3px 10px rgba(255,220,160,0.45));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .portrait-wrapper {
            width: 420px;
            height: 540px;
            overflow: hidden;
            clip-path: ellipse(48% 52% at 50% 50%);
            background: #fff;
        }
        .portrait-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .right {
            flex: 1 1 54%;
            padding: 10px 20px 10px 10px;
        }
        .right .content {
            position: relative;
            z-index: 2;
            padding-top: 10px;
        }

        /* 音乐控制按钮 */
        .music-btn {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #BC5B40, #F88F70);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(188,91,64,0.45);
            transition: transform 0.15s, box-shadow 0.15s;
            user-select: none;
        }
        .music-btn:hover {
            transform: translateY(-3px) scale(1.08);
            box-shadow: 0 8px 24px rgba(188,91,64,0.5);
        }
        .music-btn:active {
            transform: scale(0.95);
        }
        .music-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 4s linear infinite;
        }
        .music-icon.paused {
            animation-play-state: paused;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 响应式处理 */
        @media (max-width: 880px) {
            .card { flex-direction: column; text-align: center; }
            .left, .right { flex: none; width: 100%; }
            .portrait-frame { width: 314px; height: 394px; margin: 0 auto; }
            .portrait-wrapper { width: 300px; height: 380px; }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="left">
            <div class="portrait-frame">
                <div class="portrait-wrapper">
                    <img src="nana.jpg" alt="纳纳仔的照片">
                </div>
            </div>
        </div>
        <div class="right">
            

            <div class="content">
                <h1>Happy<br> 
                    Birthday</h1>
                <div class="subtitle" style="font-family: 'SimSun','Songti SC','Noto Serif SC',serif; font-weight:700;">祝纳纳仔<span style="font-weight:900; font-size:2.0em;">20</span>岁 生日快乐！</div>
                <div class="flower">🌸</div>
                <p class="message">
                    感谢纳纳仔 像清晨的甜甜小橘子一样，<br>
                    出现在小鱼仔的大学生活中！<br>
                    祝闪闪发光，<br>
                    祝健康、祝成长、祝幸福！ ✨
                </p>
            </div>
        </div>
    </div>

    
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">
        <span class="music-icon" id="musicIcon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="white">
                <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
            </svg>
        </span>
    </button>

    <audio id="bgm" autoplay loop>
        <source src="bgm.MP3" type="audio/mpeg">
    </audio>

    <script>
        function toggleMusic() {
            const audio = document.getElementById('bgm');
            const icon = document.getElementById('musicIcon');
            if (audio.paused) {
                audio.play();
                icon.classList.remove('paused');
            } else {
                audio.pause();
                icon.classList.add('paused');
            }
        }
    </script>
</body>
</html>
